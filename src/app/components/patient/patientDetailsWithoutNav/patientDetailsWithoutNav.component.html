<div class="grid" *ngIf="patientDetailPassed; else noData" style="margin-left: 100px; margin-right: 100px;">


    <div class="col-8">
        <div style="display: flex; gap: 10px;">

            <div
                style="flex: 1; border-radius: 5px; display: flex; flex-direction: column; align-items: center; justify-content: center; background-color: #ffffff; padding: 20px">
                <div
                    style="margin-bottom: 10px; height: 150px; width: 150px; border-radius: 5px; background-color: black;">
                </div>
                <div
                    style="margin-bottom: 10px; font-weight: bold; font-size: 20px; font-style: normal; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif">
                    {{ patientDetailPassed.name }}</div>
                <div
                    style="font-weight: bolder; font-size: 15px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color:#2c98f0">
                    {{patientDetailPassed.phone}}</div>
            </div>


            <div style="flex: 1; border-radius: 5px; background-color: #ffffff;">
                <div
                    style="display: flex; justify-content: left; align-items: center; font-size: xx-large; padding-left:20px; padding-top: 20px; padding-bottom: 20px; height: 50px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif">
                    Demograhic Info</div>
                <div style="flex: 1; flex-direction: column; background-color: red; width: 100%; height: 80%;">

                </div>
            </div>
        </div>
    </div>
    <div class="col-4" style="background-color: red;">right</div>
</div>



<ng-template #noData>
</ng-template>
